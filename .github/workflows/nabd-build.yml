name: Nabd OS Build Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run the build manually

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission to Gradle
      run: chmod +x gradlew

    - name: Verify llama.cpp Source
      run: |
        ls -la app/src/main/cpp/third_party/llama.cpp | head -n 20
        [ -f app/src/main/cpp/third_party/llama.cpp/CMakeLists.txt ] || exit 1

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace --info
      env:
        GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m"

    - name: Debug on Failure
      if: failure()
      run: |
        echo "Listing build directory contents..."
        find . -name "build.log" || true
        find . -name "*.apk" || true
        ls -R app/build/reports || true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: nabd-os-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
