name: Nabd OS Build Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run the build manually

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission to Gradle
      run: chmod +x gradlew

    - name: Verify llama.cpp Source
      run: |
        ls -la app/src/main/cpp/third_party/llama.cpp | head -n 20
        [ -f app/src/main/cpp/third_party/llama.cpp/CMakeLists.txt ] || exit 1

    - name: Build Debug APK
      run: ./gradlew :app:assembleDebug --stacktrace --info

    - name: Debug on Failure
      if: failure()
      run: |
        echo "=== PROJECT STRUCTURE ==="
        find . -maxdepth 3 -not -path '*/.*'
        echo "=== ANDROID HOME ==="
        echo $ANDROID_HOME
        echo "=== NDK HOME ==="
        echo $ANDROID_NDK_HOME
        ls -R app/build/reports || true


    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: nabd-os-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
